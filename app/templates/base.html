<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}{% endblock %} - FinanzasApp</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('main.dashboard') }}">💰 FinanzasApp</a>

    <div>
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-light btn-sm">Dashboard</a>
      <a href="{{ url_for('main.nuevo') }}" class="btn btn-success btn-sm">Nuevo</a>
      <a href="{{ url_for('main.logout') }}" class="btn btn-danger btn-sm">Salir</a>
    </div>
  </div>
</nav>

<div class="container">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} text-center">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
